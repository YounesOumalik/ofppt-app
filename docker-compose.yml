version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ofppt-db
    environment:
      POSTGRES_DB: ofppt
      POSTGRES_USER: ofppt_user
      POSTGRES_PASSWORD: ofppt_pass_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ofppt_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ofppt-backend
    environment:
      DATABASE_URL: postgresql://ofppt_user:ofppt_pass_dev@db:5432/ofppt
      JWT_SECRET: dev-secret-key-change-in-production
      ADMIN_EMAIL: admin@efp.app.ma
      ADMIN_PASSWORD: Admin@2026
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ofppt-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm run dev

volumes:
  postgres_data:
